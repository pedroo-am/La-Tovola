<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserva de Restaurante</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="form-box">
      <h1>Faça sua Reserva</h1>
      <form>
        <label for="nome">Nome:</label>
        <input placeholder="José da Silva"  type="text" id="nome" name="nome" required />

        <label for="email">E-mail:</label>
        <input placeholder="seuemail@email.com"  type="email" id="email" name="email" required />

        <label for="data">Data:</label>
        <div class="date-group">
          <input type="date" id="data" required />
        </div>

        <label for="pessoas">Número de pessoas:</label>
        <input type="number" id="pessoas" name="pessoas" min="1"  max="20"   required />


          <label for="horário">Horário</label>
          <input type="time" name="" id="">


        <button type="submit">Reservar Agora</button>
      </form>
    </div>
     <div class="img-vinho">
    <img src="imagens/vinho.png" alt="imagem reserva">
  </div>
  </div>



  
</body>
</html>
